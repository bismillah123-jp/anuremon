    async function inflateBase64Gzip(base64) {
      const binary = Uint8Array.from(atob(base64), (char) => char.charCodeAt(0));
      if (!('DecompressionStream' in window)) {
        throw new Error('Browser belum mendukung DecompressionStream. Gunakan Chrome atau Edge terbaru.');
      }
      const stream = new Blob([binary]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    }

    inflateBase64Gzip(INDEX_GZIP_BASE64)
      .then((html) => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch((err) => {
        document.body.innerHTML = '<div class="loader"><h1>Gagal memuat POS</h1><p>' + err.message + '</p></div>';
      });
  </script>
